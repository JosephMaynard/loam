name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm test

      # apps/app has no build script (Expo), so the recursive build step skips it — typecheck it
      # explicitly or its TypeScript is never validated in CI. It does have a Vitest `test` script
      # (apps/app/vitest.config.ts), which the "Unit tests" step above already runs via `pnpm test`
      # → `pnpm -r --if-present test`.
      - name: Android host typecheck
        run: pnpm --filter app typecheck
